name: Pages

on:
  push:
    branches: [master]
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages (ttyd, ffmpeg, chromium deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ttyd ffmpeg \
            libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libxkbcommon0 libatspi2.0-0t64 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Allow unprivileged user namespaces (chromium sandbox)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Generate screenshots and videos
        run: bash docs/generate_screenshots.sh

      - name: Build MkDocs site
        run: uvx --with mkdocs-material mkdocs build --strict -f docs/mkdocs.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
