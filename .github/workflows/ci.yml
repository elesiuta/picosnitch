name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      # run linters via uv run, not uv tool run, so they use the pinned dev group
      # instead of the latest release; uv sync also gives ty the env for tests/
      - run: uv sync
      - run: uv run ruff check
      - run: uv run ruff format --diff
      - run: uv run tach check
      - run: uv run ty check

  build:
    name: Build
    uses: ./.github/workflows/build.yml

  test:
    name: Tests (${{ matrix.platform.name }}, py${{ matrix.python-version }}, requires root/BPF)
    needs: build
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        platform:
          - runner: ubuntu-latest
            name: manylinux_2_34_x86_64
          - runner: ubuntu-24.04-arm
            name: manylinux_2_34_aarch64
    steps:
      - uses: actions/checkout@v6
        with:
          # Only need the tests/ directory; install picosnitch from the wheel
          # that the build job produced rather than from the working tree.
          sparse-checkout: |
            tests
            pyproject.toml
          sparse-checkout-cone-mode: false
      - uses: actions/download-artifact@v8
        with:
          name: wheel-${{ matrix.platform.name }}
          path: dist
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install runtime dependencies
        # libbpf1 provides libbpf.so for picosnitch's ctypes wrapper.
        # curl/wget are exercised by the tests as short-lived processes.
        run: |
          sudo apt-get update
          sudo apt-get install -y libbpf1 curl wget
      - name: Install picosnitch wheel + pytest into venv
        run: |
          uv venv
          uv pip install dist/*.whl pytest
      - name: Run tests
        run: sudo -E env "PATH=$PATH" .venv/bin/pytest tests/ -v
