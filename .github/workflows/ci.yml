name: CI (ruff + pytest)

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install ruff
        run: uv tool install ruff
      - name: Ruff check (lint)
        run: uv tool run ruff check .
      - name: Ruff format (check no changes)
        run: uv tool run ruff format --diff .

  test:
    name: Tests (requires root/BPF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Install BPF build and picosnitch test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-tools-common linux-tools-generic linux-tools-$(uname -r) curl wget
      - name: Locate bpftool and pre-generate vmlinux.h
        run: |
          BPFTOOL=$(command -v bpftool || echo /usr/lib/linux-tools/$(uname -r)/bpftool)
          echo "Using bpftool: $BPFTOOL"
          ls -l /sys/kernel/btf/vmlinux
          mkdir -p src/picosnitch/bpf
          sudo "$BPFTOOL" btf dump file /sys/kernel/btf/vmlinux format c | sudo tee src/picosnitch/bpf/vmlinux.h > /dev/null
          sudo chown "$USER:$USER" src/picosnitch/bpf/vmlinux.h
      - name: Sync project
        run: uv sync --all-extras
      - name: Run all tests
        run: sudo -E env "PATH=$PATH" uv run pytest tests/ -v
