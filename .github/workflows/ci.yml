name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv tool run ruff check
      - run: uv tool run ruff format --diff
      - run: uv tool run tach check
      - run: uv tool run ty check

  build:
    name: Build
    uses: ./.github/workflows/build.yml

  test:
    name: Tests (${{ matrix.platform }}, requires root/BPF)
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: manylinux_2_34_x86_64
          - runner: ubuntu-24.04-arm
            platform: manylinux_2_34_aarch64
    steps:
      - uses: actions/checkout@v6
        with:
          # Only need the tests/ directory; install picosnitch from the wheel
          # that the build job produced rather than from the working tree.
          sparse-checkout: |
            tests
            pyproject.toml
          sparse-checkout-cone-mode: false
      - uses: actions/download-artifact@v8
        with:
          name: wheel-${{ matrix.platform }}
          path: dist
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Install runtime dependencies
        # libbpf1 provides libbpf.so for picosnitch's ctypes wrapper.
        # curl/wget are exercised by the tests as short-lived processes.
        run: |
          sudo apt-get update
          sudo apt-get install -y libbpf1 curl wget
      - name: Install picosnitch wheel + pytest into venv
        run: |
          uv venv
          uv pip install dist/*.whl pytest
      - name: Run tests
        run: sudo -E env "PATH=$PATH" .venv/bin/pytest tests/ -v
