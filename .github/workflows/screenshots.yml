name: Screenshots

on:
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Artifact retention (1-90 days)"
        required: false
        default: "14"
  release:
    types: [created]

permissions:
  contents: write

jobs:
  screenshots:
    name: Generate UI screenshots and videos
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages (ttyd, ffmpeg, chromium deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ttyd ffmpeg \
            libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libxkbcommon0 libatspi2.0-0t64 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Allow unprivileged user namespaces (chromium sandbox)
        # VHS launches chromium via go-rod; on Ubuntu 24.04 the AppArmor
        # restriction on unprivileged user namespaces breaks the sandbox.
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Generate screenshots
        run: bash docs/generate_screenshots.sh

      - name: List artifacts
        run: ls -la docs/screenshots/out/

      - name: Upload screenshot artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: picosnitch-screenshots
          path: docs/screenshots/out/
          retention-days: ${{ github.event.inputs.retention_days }}
          if-no-files-found: error

      - name: Attach screenshots to release
        # Curated set of files referenced from README.md and docs/index.md.
        # Update this list whenever the docs reference new/different files.
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            docs/screenshots/out/webui-overview-1d.png
            docs/screenshots/out/webui-overview-1d-light.png
            docs/screenshots/out/webui-by-domain-1d.png
            docs/screenshots/out/webui-filter-web-content.png
            docs/screenshots/out/webui-live.png
            docs/screenshots/out/tui-domains.png
            docs/screenshots/out/tui-executables.png
            docs/screenshots/out/tui-process-names.png
            docs/screenshots/out/tui-parent-names.png
            docs/screenshots/out/tui-remote-addresses.png
            docs/screenshots/out/tui-find.png
            docs/screenshots/out/tui-live.png
            docs/screenshots/out/top-default.png
            docs/screenshots/out/top-sort-recv.png
            docs/screenshots/out/top-paused.png
            docs/screenshots/out/top-help.png
            docs/screenshots/out/web_ui.webm
            docs/screenshots/out/tui.webm
            docs/screenshots/out/top.webm
            docs/screenshots/out/terminal_ui.webm
