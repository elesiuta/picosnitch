site_name: picosnitch
site_description: Per-executable network bandwidth monitoring for Linux
site_url: https://elesiuta.github.io/picosnitch/
repo_url: https://github.com/elesiuta/picosnitch
repo_name: elesiuta/picosnitch
edit_uri: ""

docs_dir: .
site_dir: ../site

# Skip helper files and legacy assets that live alongside docs but aren't part of the site.
exclude_docs: |
  _build/
  callgraph.py
  callgraph.dot
  callgraph.svg
  generate_screenshots.sh
  mkdocs.yml
  screenshot.png
  terminal_ui.gif
  web_ui.gif
  screenshots/generate_screenshots.py
  screenshots/keystroke_overlay.py
  screenshots/mock_feed.py
  screenshots/playwright_webui.py
  screenshots/seed_db.py
  screenshots/fixtures/
  screenshots/vhs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - toc.integrate
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - ..
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search
  - glightbox

extra_css:
  - assets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/elesiuta/picosnitch
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/picosnitch/

nav:
  - Home: index.md
  - Screenshots: screenshots.md
  - Configuration: configuration.md
  - How it works: how-it-works.md
  - Database schema: schema.md
